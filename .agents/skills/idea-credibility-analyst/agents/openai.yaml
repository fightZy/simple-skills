version: 1
interface:
  display_name: Idea Credibility Analyst
  short_description: Clarify an idea, research alternatives, assess crowdedness, inspect leading competitors, and recommend continue, pivot, or stop.
  default_prompt: Evaluate the user's product, startup, feature, or workflow idea by interviewing until understanding is high, researching similar products and community discussion, comparing alternatives, assessing crowdedness, deep-diving leading competitors and persistent user complaints when the space is crowded, and making a continue, pivot, or stop recommendation.
